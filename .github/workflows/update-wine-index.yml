# Vinvalvet: manuell uppdatering av vinindexet.
#
# Den här workflowen kör hela datakedjan (npm run update) på GitHub:
#   1. Hämtar ny products.json från Systembolaget.
#   2. Skriver över data/products.json.
#   3. Kör filtermotorn som skapar output/wine-index.json,
#      output/wine-index-meta.json och logs/filter-report.json.
# Om något i repot ändrats committas och pushas resultatet tillbaka till main.
#
# Första versionen: körs ENDAST manuellt (workflow_dispatch).
# Ingen schemaläggning/cron och inga secrets ännu.

name: Update Wine Index

# Manuell körning + automatisk nattlig uppdatering.
on:
  workflow_dispatch:
  schedule:
    # Vinvalvet: nattlig körning en gång per dygn.
    # Cron anges i UTC: 02:15 UTC = 03:15 svensk vintertid (CET).
    # Under sommartid (CEST) blir det 04:15 svensk tid — "ungefär 03:15".
    - cron: "15 * * * *"

# Undvik parallella körningar (t.ex. manuell start samtidigt som cron).
concurrency:
  group: update-wine-index
  cancel-in-progress: false

# Behövs för att kunna pusha tillbaka commit:en till repot.
permissions:
  contents: write

jobs:
  update:
    name: Update generated wine index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js (senaste LTS)
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run update chain (Vinvalvet)
        run: npm run update

      - name: Commit and push if changed
        run: |
          # Vinvalvet: konfigurera git-identitet för den automatiska commit:en.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Vinvalvet: filerna nedan är gitignore:ade (data/, output/, logs/)
          # och därmed otrackade, så git status ser dem inte. Stage:a dem
          # FÖRST med -f, och kontrollera därefter om något faktiskt ändrats.
          git add -f \
            output/wine-index.json \
            output/wine-index-meta.json \
            logs/filter-report.json

          # Kontrollera staged diff efter add.
          if git diff --cached --quiet; then
            echo "Vinvalvet: inga ändringar att committa, avslutar utan commit."
            exit 0
          fi

          echo "Vinvalvet: ändringar hittades, committar och pushar till main."
          git commit -m "Update generated wine index"
          git push
